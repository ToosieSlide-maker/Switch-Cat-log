.cbped{flex:1;background:#CC0000;border:none;border-radius:10px;padding:10px;color:#fff;font-size:12px;font-weight:900;cursor:pointer}

/* Ventana de detalles de consola */
.modal {
    display: none; 
    position: fixed; 
    z-index: 1000; 
    left: 0; top: 0; 
    width: 100%; height: 100%; 
    background-color: rgba(0,0,0,0.95);
    overflow-y: auto;
    backdrop-filter: blur(5px);
}
.modal-content {
    background: #1a1a2e;
    margin: 5% auto;
    padding: 20px;
    width: 90%;
    max-width: 500px;
    border-radius: 20px;
    border: 1px solid #3d3d5e;
    position: relative;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
}
.close-modal {
    position: absolute;
    right: 20px; top: 10px;

<script>
const WA='5355207586', PX='350 CUP';
let aG='Todos', aCard=null, curTab='juegos';
const SHEET_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vT2RBJAM2CAxW-PfOZCBMMWPtc3mCq429w3CY-FXtI9ZAqTbswzLKe7-hlribvwH75pyZUbHZ5YDZ88/pub?gid=0&single=true&output=tsv';

function setTab(t){
  curTab=t;
  document.getElementById('sec-juegos').style.display=t==='juegos'?'block':'none';
  document.getElementById('sec-consolas').style.display=t==='consolas'?'block':'none';
  document.getElementById('si').style.display=t==='juegos'?'block':'none';
  document.getElementById('tab-juegos').className='navtab '+(t==='juegos'?'on':'off');
  document.getElementById('tab-consolas').className='navtab '+(t==='consolas'?'on':'off');
  if(t==='consolas') loadConsolas();
}

function pedirConsola(n,p,e){
  e.stopPropagation();
  const msg=`Hola, me interesa la consola: *${n}* (${p} USD)`;
  window.open(`https://wa.me/5355207586?text=${encodeURIComponent(msg)}`,'_blank');
}
function compartirConsola(n,p,d,e){
  e.stopPropagation();
  const msg=`🕹️ *${n}*\n💰 ${p} USD\n${d}\n\n📲 Pedidos: wa.me/5355207586`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}
function verConsola(nombre, imagenes, descripcion, precio) {
    const modal = document.getElementById('consoleModal');
    const gallery = document.getElementById('modalGallery');
    gallery.innerHTML = '';
    if (imagenes) {
        const fotos = imagenes.split('|');
        fotos.forEach(ruta => {
            if(ruta.trim() !== "") {
                const img = document.createElement('img');
                img.src = ruta.trim();
                img.className = 'gallery-img';
                img.alt = nombre;
                gallery.appendChild(img);
            }
        });
    }
    document.getElementById('modalTitle').innerText = nombre;
    document.getElementById('modalDesc').innerText = descripcion;
    document.getElementById('modalWapp').onclick = () => {
        const msg = `Hola, me interesa la consola: ${nombre} (${precio})`;
        window.open(`https://wa.me/5355207586?text=${encodeURIComponent(msg)}`);
    };
    modal.style.display = 'block';
}
window.onclick = function(event) {
    const modal = document.getElementById('consoleModal');
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
function loadConsolas(){
  const cg=document.getElementById('congrid');
  const cl=document.getElementById('con-loading');
  if(cg.children.length>0){cl.style.display='none';return;}
  cl.style.display='block';
  fetch(SHEET_URL)
    .then(r=>r.text())
    .then(tsv=>{
      cl.style.display='none';
      const rows=tsv.trim().split('\n').slice(1);
      rows.forEach(row=>{
        const cols=row.split('\u0009');
        const n=(cols[0]||'').trim();
        const p=(cols[1]||'').trim();
        const disp=(cols[2]||'').trim().toUpperCase();
        const img=(cols[3]||'').trim();
        const desc=(cols[4]||'').trim();
        const specs=(cols[5]||'').trim();
        const d=document.createElement('div');
        d.className='con-card';
        d.innerHTML=`
          ${img?`<img class="con-img" src="${img.split('|')[0]}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${n}" onclick="verConsola('${n}','${img}','${desc}','${p}')" style="cursor:pointer"/><div class="con-img-fall" style="display:none" onclick="verConsola('${n}','${img}','${desc}','${p}')">🕹️</div>`:`<div class="con-img-fall" onclick="verConsola('${n}','${img}','${desc}','${p}')">🕹️</div>`}
          <div class="con-info">
            <div class="con-name">${n}</div>
            <div class="${disp==='SI'?'con-stock-si':'con-stock-no'}">${disp==='SI'?'✅ Disponible':'❌ Agotado'}</div>
            <div class="con-specs">${specs}</div>
            <div class="con-price">${p} USD</div>
            <div class="con-btns">
              <button class="cbped" onclick="pedirConsola('${n}','${p}',event)">🛒 Pedir</button>
              <button class="cbcom" onclick="compartirConsola('${n}','${p}','${desc}',event)">📤 Compartir</button>
            </div>
          </div>`;
        cg.appendChild(d);
      });
    })
    .catch(()=>{cl.textContent='⚠️ Error cargando consolas. Intenta de nuevo.';});
}

// Genres
const GENRES=["Todos",...new Set(G.map(x=>x.g)).values()].sort((a,b)=>a==="Todos"?-1:a.localeCompare(b));
  const btnNew=document.createElement("button");
btnNew.className="gb gb-new";
btnNew.textContent="🆕 Recién agregados";
btnNew.onclick=()=>{aG='__new__';document.querySelectorAll(".gb").forEach(x=>x.classList.remove("on"));btnNew.classList.add("on");render()};
document.getElementById("gbar").prepend(btnNew);
const bar=document.getElementById("gbar");
GENRES.forEach(g=>{
  const b=document.createElement("button");
  b.className="gb"+(g==="Todos"?" on":"");
  b.textContent=g;
  b.onclick=()=>{aG=g;document.querySelectorAll(".gb").forEach(x=>x.classList.remove("on"));b.classList.add("on");render()};
  bar.appendChild(b);
});

function stars(n){const f=Math.floor(n),h=n%1>=.5;return"★".repeat(f)+(h?"½":"")+"☆".repeat(5-f-(h?1:0))}

function filtered(){
  const q=document.getElementById("si").value.toLowerCase().trim();
  const s=document.getElementById("ss").value;
  let list=[...G];
 if(aG==='__new__')list=G.slice(-10);
else if(aG!=="Todos")list=list.filter(x=>x.g===aG);
  if(q){const words=q.split(' ').filter(w=>w.length>0);list=list.filter(x=>words.every(w=>x.t.toLowerCase().includes(w)||x.g.toLowerCase().includes(w)));};
  if(s==="az")list.sort((a,b)=>a.t.localeCompare(b.t));
  else if(s==="rating")list.sort((a,b)=>b.r-a.r);
  else if(s==="genre")list.sort((a,b)=>a.g.localeCompare(b.g)||a.t.localeCompare(b.t));
  return list;
}

function pedir(game,e){
  e.stopPropagation();
  const msg=`Hola, me interesa el juego: *${game.t}* (${PX})`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,"_blank");
}

function compartir(game,e){
  e.stopPropagation();
  const msg=`🎮 *${game.t}*\n🎯 ${game.g} · ⭐${game.r}/5\n💰 ${PX}\n\n📲 Pedidos: wa.me/${WA}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,"_blank");
}

function shareAll(){
  const list=filtered();
  const hdr=`🎮 *TS Game Store – Nintendo Switch*\n💰 Precio: ${PX} c/u\n\n`;
  const body=list.map((g,i)=>`${i+1}. ${g.t}`).join("\n");
  const footer=`\n\n📲 Pedidos: wa.me/${WA}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(hdr+body+footer)}`,"_blank");
}

function render(){
  const list=filtered();
  document.getElementById("cl").textContent=`${list.length} juego${list.length!==1?"s":""}`;
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  if(!list.length){
    grid.innerHTML=`<div class="empty"><p>🕹️</p><p>No se encontraron juegos</p></div>`;
    return;
  }
  list.forEach(game=>{
    const card=document.createElement("div");
    card.className="card";
    const gid=`ov_${game.t.replace(/\W/g,"")}`;
    card.innerHTML=`
      <div class="cimg" style="background:${game.col}">
        ${game.c?`<img src="${game.c}" alt="${game.t}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>`:""}
        <div class="fall" style="${!game.c?"display:flex":""}background:${game.col}">
          <img src="logo.png" alt="TS" onerror="this.outerHTML='<span style=font-size:38px>🎮</span>'"/>
          <p>${game.t}</p>
        </div>
        <div class="bg">${game.g}</div>
        <div class="bp">${PX}</div>
        <div class="ov" id="${gid}">
          <div class="ovt">${game.t}</div>
          <div class="ovd">⭐ ${game.r}/5 · ${game.g}</div>
          <div class="ovs">${stars(game.r)}</div>
          <div style="font-size:10px;color:#ccc;margin-top:4px;line-height:1.5">${game.d||''}</div>
        </div>
      </div>
      <div class="cfoot">
        <div class="ctit">${game.t}</div>
        <div class="cbtns">
          <button class="bped" onclick="pedir(${JSON.stringify(game).replace(/"/g,'&quot;')},event)">🛒 Pedir</button>
          <button class="bcom" onclick="compartir(${JSON.stringify(game).replace(/"/g,'&quot;')},event)">📤 Compartir</button>
        </div>
      </div>`;
    card.querySelector(".cimg").onclick=()=>{
      const ov=document.getElementById(gid);
      const on=ov.classList.contains("on");
      if(aCard&&aCard!==ov)aCard.classList.remove("on");
      ov.classList.toggle("on",!on);
      aCard=on?null:ov;
    };
    grid.appendChild(card);
  });
}

render();
</script>
