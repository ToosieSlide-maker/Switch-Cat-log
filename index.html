function loadConsolas(){
  const cg=document.getElementById('congrid');
  const cl=document.getElementById('con-loading');
  cg.innerHTML='';
  cl.style.display='block';
  const run=(tsv)=>{
    _consolasTs=Date.now();
    window._consolasData=tsv;
    cl.style.display='none';
    cg.innerHTML='';
    const rows=tsv.trim().split('\n').slice(1);
    const parsed=rows.map(row=>{
      const cols=row.split('\u0009');
      return {
        n:(cols[0]||'').trim(),
        p:(cols[1]||'').trim(),
        disp:(cols[2]||'').trim().toUpperCase(),
        img:(cols[3]||'').trim(),
        desc:(cols[4]||'').trim().replace(/[\n\r]/g,' '),
        specs:(cols[5]||'').trim()
      };
    }).filter(x=>x.n);
    parsed.sort((a,b)=>{
      if(a.disp==='SI'&&b.disp!=='SI') return -1;
      if(a.disp!=='SI'&&b.disp==='SI') return 1;
      return 0;
    });
    parsed.forEach(({n,p,disp,img,desc,specs})=>{
      const d=document.createElement('div');
      d.className='con-card';
      d.style.cursor='pointer';
      d.dataset.nombre=n;
      d.dataset.img=img;
      d.dataset.desc=desc;
      d.dataset.precio=p;
      d.addEventListener('click',function(e){
        if(e.target.closest('.con-btns')) return;
        const c=e.currentTarget;
        verConsola(c.dataset.nombre,c.dataset.img,c.dataset.desc,c.dataset.precio);
      });
      d.innerHTML=`
        ${img?`<img class="con-img" src="${img.split('|')[0]}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${n}"/><div class="con-img-fall" style="display:none">🕹️</div>`:`<div class="con-img-fall">🕹️</div>`}
        <div class="con-info">
          <div class="con-name">${n}</div>
          <div class="${disp==='SI'?'con-stock-si':'con-stock-no'}">${disp==='SI'?'✅ Disponible':'❌ Agotado'}</div>
          <div class="con-specs">${specs}</div>
          <div class="con-price">${p} USD</div>
         <div class="con-btns">
           <button class="cbped" data-img="${img.split('|')[0]}" ${disp!=='SI'?'disabled style="opacity:.35;cursor:not-allowed"':''} onclick="event.stopPropagation();addConsoleToCart('${n}','${p}',this)">🛒 Agregar</button>
            <button class="cbcom" onclick="event.stopPropagation();const c=this.closest('.con-card');compartirConsola(c.dataset.nombre,c.dataset.precio,c.dataset.desc,event)">📤 Compartir</button>
          </div>
        </div>`;
      cg.appendChild(d);
    });
  };
  const stale=Date.now()-_consolasTs>300000;
  if(window._consolasData&&!stale){
    run(window._consolasData);
  } else {
    fetch(SHEET_URL).then(r=>r.text()).then(run).catch(()=>{
      if(window._consolasData) run(window._consolasData);
      else cl.textContent='⚠️ Error cargando consolas. Intenta de nuevo.';
    });
  }
}

    function getCardGlowByRating(r){

  if (rating >= 4.2) {
    return {
      border: 'rgba(0,212,255,.32)',
      glow: 'rgba(0,212,255,.22)'
    };
  }

  if (rating >= 4.0) {
    return {
      border: 'rgba(192,132,252,.30)',

    };

  (function(){
  const fab=document.getElementById('cart-fab');
  let dragging=false,startX=0,startY=0,origX=0,origY=0,moved=false,activePointerId=null,suppressClick=false;

  function finishDrag(){
    if(!dragging)return;
    dragging=false;

    if(!moved){
      return;
    }

    const r=fab.getBoundingClientRect();
    const sw=window.innerWidth;
    const sh=window.innerHeight;
    const snapLeft=r.left+r.width/2<sw/2;
    const nextLeft=snapLeft?12:sw-r.width-12;
    const nextTop=Math.min(Math.max(r.top,12),sh-r.height-12);

    fab.style.transition='left .25s ease, top .25s ease';
    fab.style.left=nextLeft+'px';
    fab.style.top=nextTop+'px';

    suppressClick=true;
    setTimeout(()=>{suppressClick=false;},250);
  }

  fab.addEventListener('pointerdown',e=>{
    activePointerId=e.pointerId;
    dragging=true;
    moved=false;
    startX=e.clientX;
    startY=e.clientY;

    const r=fab.getBoundingClientRect();
    origX=r.left;
    origY=r.top;

    fab.style.transition='none';
    fab.style.right='auto';
    fab.style.bottom='auto';
    fab.style.left=origX+'px';
    fab.style.top=origY+'px';

    if(fab.setPointerCapture){
      fab.setPointerCapture(e.pointerId);
    }
  });

  fab.addEventListener('pointermove',e=>{
    if(!dragging||e.pointerId!==activePointerId)return;

    const dx=e.clientX-startX;
    const dy=e.clientY-startY;

    if(Math.abs(dx)>12||Math.abs(dy)>12){
      moved=true;
    }

    if(moved){
      const maxLeft=window.innerWidth-fab.offsetWidth-12;
      const maxTop=window.innerHeight-fab.offsetHeight-12;
      const nextLeft=Math.min(Math.max(origX+dx,12),maxLeft);
      const nextTop=Math.min(Math.max(origY+dy,12),maxTop);

      fab.style.left=nextLeft+'px';
      fab.style.top=nextTop+'px';
    }
  });

  fab.addEventListener('pointerup',e=>{
    if(e.pointerId!==activePointerId)return;
    finishDrag();
    activePointerId=null;
  });

  fab.addEventListener('pointercancel',e=>{
    if(e.pointerId!==activePointerId)return;
    finishDrag();
    activePointerId=null;
  });

  fab.addEventListener('click',e=>{
    if(suppressClick){
      e.preventDefault();
      e.stopPropagation();
    }
  },true);
})();
