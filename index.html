*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a14;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#1a1a2e,#2d2d4e);padding:14px 14px 12px;position:sticky;top:0;z-index:99;box-shadow:0 4px 24px rgba(0,0,0,.55)}
.hrow{display:flex;align-items:center;justify-content:space-between;max-width:720px;margin:0 auto 11px}
.hlogo{display:flex;align-items:center;gap:10px}
.hlogo img{height:42px;width:42px;border-radius:10px;object-fit:contain;background:#000;padding:2px}
.htxt h1{font-size:18px;font-weight:900;line-height:1.1}
.htxt small{font-size:11px;opacity:.8}
.btnall{background:#0AB9E6;border:none;border-radius:10px;padding:8px 13px;color:#fff;font-weight:800;cursor:pointer;font-size:12px;white-space:nowrap}
.swrap{max-width:720px;margin:0 auto}
#si{width:100%;padding:11px 16px;border-radius:12px;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:14px;outline:none}
#si::placeholder{color:rgba(255,255,255,.55)}
.body{max-width:720px;margin:0 auto;padding:13px 11px}
.gbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:11px;scrollbar-width:none}
.gbar::-webkit-scrollbar{display:none}
.gb{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:#1a1a2e;color:#fff;font-weight:600;cursor:pointer;font-size:11px;transition:background .15s}
.gb.on{background:#CC0000;border-color:#CC0000}
.tbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.cnt{font-size:12px;color:#555}
#ss{background:#1a1a2e;color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 9px;font-size:12px;outline:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:10px}
.card{border-radius:14px;overflow:hidden;cursor:pointer;background:#1a1a2e;box-shadow:0 4px 18px rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.07);transition:transform .18s}
.card:hover{transform:translateY(-3px)}
.cimg{position:relative;padding-top:140%;overflow:hidden}
.cimg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.fall{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.fall img{width:55%;opacity:.65}
.fall p{font-size:10px;color:#bbb;margin-top:7px;font-weight:700;line-height:1.3}
.bg{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);padding:3px 8px;border-radius:18px;font-size:9px;font-weight:700}
.bp{position:absolute;top:7px;right:7px;background:#E60012;padding:3px 8px;border-radius:18px;font-size:10px;font-weight:900}
.ov{position:absolute;inset:0;background:rgba(0,0,0,.91);padding:11px;display:flex;flex-direction:column;justify-content:center;gap:5px;opacity:0;transition:opacity .22s;pointer-events:none}
.ov.on{opacity:1}
.ovt{font-size:12px;font-weight:800;line-height:1.3}
.ovd{font-size:10px;color:#aaa}
.ovs{color:#FFD700;font-size:12px}
.cfoot{padding:8px 8px 0}
.ctit{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:6px;min-height:28px}
.cbtns{display:flex;gap:5px;padding-bottom:8px}
.bped{flex:1;background:#CC0000;border:none;border-radius:7px;padding:7px 3px;color:#fff;font-size:10px;font-weight:900;cursor:pointer}
.bcom{flex:1;background:#0AB9E6;border:none;border-radius:7px;padding:7px 3px;color:#fff;font-size:10px;font-weight:900;cursor:pointer}
.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:#444}
.empty p{font-size:15px;margin-top:10px}
footer{text-align:center;padding:20px;color:#1e1e2e;font-size:11px;margin-top:8px}
</style>
</head>

// Genres
const GENRES=["Todos",...new Set(G.map(x=>x.g)).values()].sort((a,b)=>a==="Todos"?-1:a.localeCompare(b));
const bar=document.getElementById("gbar");
GENRES.forEach(g=>{
  const b=document.createElement("button");
  b.className="gb"+(g==="Todos"?" on":"");
  b.textContent=g;
  b.onclick=()=>{aG=g;document.querySelectorAll(".gb").forEach(x=>x.classList.remove("on"));b.classList.add("on");render()};
  bar.appendChild(b);
});

function stars(n){const f=Math.floor(n),h=n%1>=.5;return"★".repeat(f)+(h?"½":"")+"☆".repeat(5-f-(h?1:0))}

function filtered(){
  const q=document.getElementById("si").value.toLowerCase().trim();
  const s=document.getElementById("ss").value;
  let list=[...G];
  if(aG!=="Todos")list=list.filter(x=>x.g===aG);
  if(q)list=list.filter(x=>x.t.toLowerCase().includes(q)||x.g.toLowerCase().includes(q));
  if(s==="az")list.sort((a,b)=>a.t.localeCompare(b.t));
  else if(s==="rating")list.sort((a,b)=>b.r-a.r);
  else if(s==="genre")list.sort((a,b)=>a.g.localeCompare(b.g)||a.t.localeCompare(b.t));
  return list;
}

function pedir(game,e){
  e.stopPropagation();
  const msg=`Hola, me interesa el juego: *${game.t}* (${PX})`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,"_blank");
}

function compartir(game,e){
  e.stopPropagation();
  const msg=`🎮 *${game.t}*\n🎯 ${game.g} · ⭐${game.r}/5\n💰 ${PX}\n\n📲 Pedidos: wa.me/${WA}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,"_blank");
}

function shareAll(){
  const list=filtered();
  const hdr=`🎮 *TS Game Store – Nintendo Switch*\n💰 Precio: ${PX} c/u\n\n`;
  const body=list.map((g,i)=>`${i+1}. ${g.t}`).join("\n");
  const footer=`\n\n📲 Pedidos: wa.me/${WA}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(hdr+body+footer)}`,"_blank");
}

function render(){
  const list=filtered();
  document.getElementById("cl").textContent=`${list.length} juego${list.length!==1?"s":""}`;
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  if(!list.length){
    grid.innerHTML=`<div class="empty"><p>🕹️</p><p>No se encontraron juegos</p></div>`;
    return;
  }
  list.forEach(game=>{
    const card=document.createElement("div");
    card.className="card";
    const gid=`ov_${game.t.replace(/\W/g,"")}`;
    card.innerHTML=`
      <div class="cimg" style="background:${game.col}">
        ${game.c?`<img src="${game.c}" alt="${game.t}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>`:""}
        <div class="fall" style="${!game.c?"display:flex":""}background:${game.col}">
          <img src="logo.png" alt="TS" onerror="this.outerHTML='<span style=font-size:38px>🎮</span>'"/>
          <p>${game.t}</p>
        </div>
        <div class="bg">${game.g}</div>
        <div class="bp">${PX}</div>
        <div class="ov" id="${gid}">
          <div class="ovt">${game.t}</div>
          <div class="ovd">⭐ ${game.r}/5 · ${game.g}</div>
          <div class="ovs">${stars(game.r)}</div>
        </div>
      </div>
      <div class="cfoot">
        <div class="ctit">${game.t}</div>
        <div class="cbtns">
          <button class="bped" onclick="pedir(${JSON.stringify(game).replace(/"/g,'&quot;')},event)">🛒 Pedir</button>
          <button class="bcom" onclick="compartir(${JSON.stringify(game).replace(/"/g,'&quot;')},event)">📤 Compartir</button>
        </div>
      </div>`;
    card.querySelector(".cimg").onclick=()=>{
      const ov=document.getElementById(gid);
      const on=ov.classList.contains("on");
      if(aCard&&aCard!==ov)aCard.classList.remove("on");
      ov.classList.toggle("on",!on);
      aCard=on?null:ov;
    };
    grid.appendChild(card);
  });
}

render();
