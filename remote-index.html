function stars(n){const f=Math.floor(n),h=n%1>=.5;return"★".repeat(f)+(h?"½":"")+"☆".repeat(5-f-(h?1:0))}

function filtered(){
  const q=document.getElementById("si").value.toLowerCase().trim();
  const s=document.getElementById("ss").value;
  let list=[...G];
if(aG==='__new__') list=G.slice(-10).reverse();
else if(aG==='__multi__') list=list.filter(x=>x.m===true);
else if(aG==='__coop__') list=list.filter(x=>x.coop===true);
else if(aG==='__split__') list=list.filter(x=>x.split===true);
else if(aG!=='Todos') list=list.filter(x=>x.g===aG);

if(q){
  const words=q.split(' ').filter(w=>w.length>0);
  list=list.filter(x=>words.every(w=>
    x.t.toLowerCase().includes(w) ||
    x.g.toLowerCase().includes(w) ||
    (x.d && x.d.toLowerCase().includes(w))
  ));
}

if(s==='az') list.sort((a,b)=>a.t.localeCompare(b.t));
else if(s==='rating') list.sort((a,b)=>b.r-a.r);
else if(s==='genre') list.sort((a,b)=>a.g.localeCompare(b.g)||a.t.localeCompare(b.t));

return list;
}

(function(){
  const fab=document.getElementById('cart-fab');
  let dragging=false,startX,startY,origX,origY,moved=false;
  fab.removeAttribute('onclick');
  fab.style.touchAction='none';
  fab.addEventListener('pointerdown',e=>{
    e.preventDefault();
    fab.setPointerCapture(e.pointerId);
    dragging=true;moved=false;
    startX=e.clientX;startY=e.clientY;
    const r=fab.getBoundingClientRect();
    origX=r.left;origY=r.top;
    fab.style.transition='none';
  });
  fab.addEventListener('pointermove',e=>{
    if(!dragging)return;
    const dx=e.clientX-startX,dy=e.clientY-startY;
    if(Math.abs(dx)>8||Math.abs(dy)>8){
      moved=true;
      fab.style.left=(origX+dx)+'px';
      fab.style.top=(origY+dy)+'px';
      fab.style.right='auto';
      fab.style.bottom='auto';
    }
  });
  fab.addEventListener('pointerup',e=>{
    if(!dragging)return;
    dragging=false;
    if(!moved){
      openCart();
      return;
    }
    const r=fab.getBoundingClientRect();
    const cx=r.left+r.width/2;
    const sw=window.innerWidth;
    fab.style.transition='left .25s ease,top .25s ease';
    if(cx<sw/2){fab.style.left='12px';}
    else{fab.style.left=(sw-r.width-12)+'px';}
    const newTop=Math.min(Math.max(r.top,12),window.innerHeight-r.height-12);
    fab.style.top=newTop+'px';
  });
  fab.addEventListener('pointercancel',()=>{dragging=false;});
})();
